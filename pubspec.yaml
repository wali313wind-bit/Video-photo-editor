name: video_editor
description: A professional photo and video editor
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.0.5
  riverpod: ^2.4.9
  image_picker: ^1.0.4
  ffmpeg_kit_flutter_full_gpl: ^6.0.3
  pro_image_editor: ^3.7.0
  pro_video_editor: ^1.1.0
  gallery_saver_plus: ^2.3.3
  path_provider: ^2.1.0
  permission_handler: ^11.0.1
  google_fonts: ^6.1.0
  lottie: ^2.7.0
  share_plus: ^7.2.1
  video_player: ^2.8.1
  chewie: ^1.7.0
  flutter_animate: ^4.5.0
  image: ^4.1.3
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
