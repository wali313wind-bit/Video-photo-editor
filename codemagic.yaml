workflows:
  android-only:
    name: Android APK
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Create fresh Flutter project
        script: flutter create --platforms android --org com.example --project-name luxury_editor temp_project
      - name: Copy user code
        script: |
          cp -r lib temp_project/
          cp pubspec.yaml temp_project/
      - name: Build APK
        script: |
          cd temp_project
          flutter pub get
          flutter build apk --release
    artifacts:
      - temp_project/build/app/outputs/flutter-apk/*.apk
